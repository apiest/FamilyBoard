name: Hassfest Validation
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master
