name: Bug report
description: Report a problem with the FamilyBoard integration or its Lovelace cards.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        FamilyBoard is a personal project — issues are triaged on a best-effort basis.
        Please search existing issues first, and fill out **all** sections below.

  - type: checkboxes
    id: prereqs
    attributes:
      label: Pre-flight checks
      options:
        - label: I have read the [README](https://github.com/apiest/FamilyBoard#readme).
          required: true
        - label: I have searched [existing issues](https://github.com/apiest/FamilyBoard/issues?q=is%3Aissue) for duplicates.
          required: true
        - label: I am running the latest released version of FamilyBoard.
          required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2026.4.2"
    validations:
      required: true

  - type: input
    id: fb_version
    attributes:
      label: FamilyBoard version
      placeholder: "e.g. 0.2.0"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - HACS (custom repository)
        - Manual copy of custom_components/familyboard
        - Other / unsure
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure FamilyBoard with...
        2. Open the dashboard
        3. Click on...
        4. See error
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Your `familyboard:` block from `configuration.yaml`. Redact personal info.
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Home Assistant logs
      description: Relevant excerpts from `home-assistant.log` (with `custom_components.familyboard` set to `debug`).
      render: shell
    validations:
      required: true
