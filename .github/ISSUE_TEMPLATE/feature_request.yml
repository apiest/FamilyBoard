name: Feature request
description: Suggest an enhancement for FamilyBoard.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        FamilyBoard is a personal project. Feature requests are welcome but not
        guaranteed to be implemented. Pull requests are the fastest path forward.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
