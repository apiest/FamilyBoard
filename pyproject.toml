[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = [
  "-ra",
  "--strict-markers",
  "--cov=custom_components.familyboard",
  "--cov-report=term-missing",
]

[tool.coverage.run]
source = ["custom_components/familyboard"]
omit = ["custom_components/familyboard/frontend/*"]

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
  "raise NotImplementedError",
]

# Ruff configuration aligned with Home Assistant core.
# See https://github.com/home-assistant/core/blob/dev/pyproject.toml
[tool.ruff]
target-version = "py313"
line-length = 88

[tool.ruff.lint]
select = [
  "E",      # pycodestyle errors
  "W",      # pycodestyle warnings
  "F",      # pyflakes
  "I",      # isort
  "B",      # flake8-bugbear
  "UP",     # pyupgrade
  "D",      # pydocstyle (PEP 257 docstrings)
  "ASYNC",  # flake8-async
  "SIM",    # flake8-simplify
  "TRY",    # tryceratops
  "RUF",    # Ruff-specific rules
]
ignore = [
  "D203",   # one-blank-line-before-class (conflicts with D211)
  "D213",   # multi-line-summary-second-line (conflicts with D212)
  "TRY003", # avoid specifying long messages outside the exception class
  "E501",   # line too long (handled by formatter)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["D"]   # tests don't need full docstring coverage

[tool.ruff.lint.pydocstyle]
convention = "pep257"

[tool.ruff.lint.isort]
known-first-party = ["custom_components.familyboard"]
force-sort-within-sections = true
combine-as-imports = true
