[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = [
  "-ra",
  "--strict-markers",
  "--cov=custom_components.familyboard",
  "--cov-report=term-missing",
]

[tool.coverage.run]
source = ["custom_components/familyboard"]
omit = ["custom_components/familyboard/frontend/*"]

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
  "raise NotImplementedError",
]
